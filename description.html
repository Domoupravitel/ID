<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Описание на функционалностите | Етажна собственост</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #3b6edc;
            --bg-light: #f8fafc;
            --text-main: #0F172A;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
        }

        .section {
            margin-bottom: 40px;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .placeholder-text {
            color: #64748b;
            font-style: italic;
            text-align: center;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 12px;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📑 Пълно описание на функционалностите</h1>

        <div class="section">
            <h2>🏠 За собственици и обитатели</h2>
            <div class="placeholder-text">Съдържанието ще бъде добавено скоро...</div>
        </div>

        <div class="section">
            <h2>⚙️ За домоуправители (Администратори)</h2>
            <div class="placeholder-text">Съдържанието ще бъде добавено скоро...</div>
        </div>

        <div class="section">
            <h2>💎 Предимства на системата</h2>
            <div class="placeholder-text">Съдържанието ще бъде добавено скоро...</div>
        </div>

        <a href="index.html" class="back-link">← Обратно към началната страница</a>
    </div>
</body>

</html>
